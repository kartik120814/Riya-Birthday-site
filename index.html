<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday
    my cutu bacchiii ❤️</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
}

.section {
    display: none;
    padding: 50px;
}

button {
    padding: 10px 20px;
    border: none;
    background: white;
    color: #ff4d6d;
    font-size: 18px;
    border-radius: 10px;
    cursor: pointer;
}

img {
    width: 200px;
    border-radius: 15px;
    margin: 10px;
}
</style>
</head>

<body>
<div class="balloons">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
</div>

<style>
.balloons span {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 50px;
  background: pink;
  border-radius: 50%;
  animation: float 10s linear infinite;
}

.balloons span:nth-child(2){left:20%; background:red;}
.balloons span:nth-child(3){left:40%; background:purple;}
.balloons span:nth-child(4){left:60%; background:blue;}
.balloons span:nth-child(5){left:80%; background:orange;}

@keyframes float {
  0% {transform: translateY(0);}
  100% {transform: translateY(-100vh);}
}
</style>

<div class="section" id="s1" style="display:block;">
    <h1>Happy Birthday
        Riya my bestest friend ❤️</h1>
    <button onclick="next('s2')">Click Me</button>
</div>

<div class="section" id="s2">
    <h2>You are Special 💖</h2>
    <button onclick="next('s3')">Next</button>
</div>

<div class="section" id="s3">
    <h2>Our Memories 📸</h2>
    <img src="photo1.jpg">
    <img src="photo2.jpg">
    <button onclick="next('s4')">Next</button>
</div>

<div class="section" id="s4">
    <h2>I Love You ❤️</h2>
    <button onclick="next('s5')">Final</button>
</div>

<div class="section" id="s5">
    <h1>Forever Together 💞</h1>
</div>

<script>
function next(id) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}
</script>

</body>
</html>
